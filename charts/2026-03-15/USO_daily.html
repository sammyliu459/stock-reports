<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>USO Chart</title>
<style>
body { margin: 0; padding: 0; background: #131722; }
#chart { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
    "container_id": "chart",
    "width": "100%",
    "height": "100%",
    "symbol": "AMEX:USO",
    "interval": "D",
    "timezone": "America/New_York",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "toolbar_bg": "#f1f3f6",
    "enable_publishing": false,
    "hide_top_toolbar": true,
    "hide_legend": false,
    "save_image": false,
    "calendar": false,
    "hide_volume": false,
    "support_host": "https://www.tradingview.com"
});
</script>
</body>
</html>
